name: YT Comment Watchdog
on:
  schedule:
    # Runs every 20 minutes
    - cron: '*/20 * * * *'
  workflow_dispatch: # Allows you to run it manually via the "Actions" tab

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial for saving the state file
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: pip install yt-dlp requests
        
      - name: Run Monitor
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python monitor.py
        
      - name: Commit and Push changes
        run: |
          git config --global user.name "Watchdog Bot"
          git config --global user.email "bot@github.com"
          git add comment_state.json
          git commit -m "Update comment state [skip ci]" || exit 0
          git push
