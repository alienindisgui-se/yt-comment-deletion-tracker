name: Monitor Comments

on:
  workflow_dispatch:       # Allow manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}
    permissions:
      contents: write # Crucial for saving the state file
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch free proxy
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          PROXY_DATA=$(curl -s 'https://proxylist.geonode.com/api/proxy-list?limit=1&sort_by=lastChecked&sort_type=desc&country=US&protocols=http')
          PROXY_IP=$(echo $PROXY_DATA | jq -r '.[0].ip')
          PROXY_PORT=$(echo $PROXY_DATA | jq -r '.[0].port')
          echo "PROXY=http://$PROXY_IP:$PROXY_PORT" >> $GITHUB_ENV
      - name: Install dependencies
        run: pip install yt-dlp requests
      - name: Install & Run POT Provider
        run: |
          # 1. Download the Linux binary for the POT provider
          curl -L https://github.com/jim60105/bgutil-ytdlp-pot-provider-rs/releases/download/v0.7.2/bgutil-pot-linux-x86_64 -o bgutil-pot
          chmod +x bgutil-pot
          
          # 2. Run it in the background on port 4416
          ./bgutil-pot server --host 127.0.0.1 --port 4416 &
          
          # 3. Wait for server to start up (up to 30 seconds)
          for i in {1..30}; do
            if nc -z 127.0.0.1 4416; then
              echo "PO token server is ready"
              break
            fi
            sleep 1
          done
          if ! nc -z 127.0.0.1 4416; then
            echo "PO token server failed to start"
            exit 1
          fi
      - name: Run monitor
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python monitor.py
      - name: Commit and Push changes
        run: |
          git config --global user.name "Watchdog Bot"
          git config --global user.email "bot@github.com"
          git add comment_state.json
          git commit -m "Update comment state [skip ci]" || exit 0
          git push
