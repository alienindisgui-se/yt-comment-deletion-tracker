name: Monitor Comments

on:
  schedule:
    - cron: '*/20 * * * *'  # Run every 20 minutes
  workflow_dispatch:       # Allow manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install yt-dlp requests
      - name: Install & Run POT Provider
        run: |
          # 1. Download the Linux binary for the POT provider
          curl -L https://github.com/jim60105/bgutil-ytdlp-pot-provider-rs/releases/latest/download/bgutil-pot-linux-x86_64 -o bgutil-pot
          chmod +x bgutil-pot
          
          # 2. Run it in the background on port 4416
          ./bgutil-pot server --host 127.0.0.1 --port 4416 &
          
          # 3. Give it 5 seconds to start up
          sleep 5
      - name: Run monitor
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python monitor.py
