name: Monitor Comments

on:
  schedule:
    - cron: '2-59/10 * * * *'  # Runs 2 minutes past every 10-minute interval to avoid congestion
  workflow_dispatch:       # Allows manual trigger

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false 

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write 

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important for rebasing

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run monitor
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          CHANNELS_LIST: ${{ secrets.CHANNELS_LIST }}
        run: python monitor.py

      - name: Commit and Push changes
        run: |
          # 1. Identity
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
          # 2. Stage files
          git add comment_state.json videos.json
        
          # 3. Check for changes
          if git diff --staged --quiet; then
            echo "No changes detected. Skipping push."
            exit 0
          fi

          # 4. Commit and Push with retry logic
          git commit -m "chore: update data [skip ci]"
          
          for i in {1..5}; do
            git pull --rebase origin ${{ github.ref_name }} && \
            git push origin ${{ github.ref_name }} && break || \
            (echo "Conflict or network error, retrying in 5s..." && sleep 5 && git fetch origin)
          done